name: Fiple
options:
  bundleIdPrefix: com.maksatov
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  FipleKit:
    path: FipleKit

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Automatic signing with the developer's personal team, so the apps install
    # on real devices and the setting survives `xcodegen generate`.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: VXJ8BY6538
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "3"

targets:
  FipleMac:
    type: application
    platform: macOS
    sources:
      - Apps/FipleMac
    dependencies:
      - package: FipleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maksatov.fipleapp
        PRODUCT_NAME: Fiple
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/FipleMac/Info.plist
        ENABLE_HARDENED_RUNTIME: "NO"
        ENABLE_APP_SANDBOX: "YES"
        CODE_SIGN_ENTITLEMENTS: Apps/FipleMac/Fiple.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FipleiOS:
    type: application
    platform: iOS
    sources:
      - Apps/FipleiOS
    dependencies:
      - package: FipleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maksatov.fipleapp
        PRODUCT_NAME: Fiple
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/FipleiOS/Info.plist
        # iPhone-only for 1.0 — the UI is designed for iPhone; on iPad the app
        # runs in iPhone compatibility mode instead of promising a native layout.
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_ENTITLEMENTS: Apps/FipleiOS/Fiple.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
