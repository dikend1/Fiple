name: Fiple
options:
  bundleIdPrefix: com.maksatov
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  FipleKit:
    path: FipleKit
  # SwiftTerm (MIT) — xterm-compatible terminal renderer for the iOS remote
  # terminal. First third-party dependency; recorded per the stack-selection
  # policy. iOS client only; the Mac host has no SwiftTerm dependency.
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  # RevenueCat (StoreKit 2 receipt backend) — powers the Fiple Pro paywall.
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Automatic signing with the developer's team, so the apps install on real
    # devices and the setting survives `xcodegen generate`.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: VXJ8BY6538
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "5"

targets:
  FipleMac:
    type: application
    platform: macOS
    sources:
      - Apps/FipleMac
    dependencies:
      - package: FipleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maksatov.fipleapp
        PRODUCT_NAME: Fiple
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/FipleMac/Info.plist
        # 1.0 ships sandboxed for the Mac App Store (Fiple.entitlements). The
        # phone-driven terminal needs a real login shell, which the sandbox
        # can't host — it ships later as a Developer ID build with the sandbox
        # off (see FipleTerminalDev.entitlements / ADR-0006). For local terminal
        # testing on this machine, flip ENABLE_APP_SANDBOX to NO and swap the
        # entitlements to FipleTerminalDev.entitlements — but never commit that.
        ENABLE_APP_SANDBOX: "YES"
        CODE_SIGN_ENTITLEMENTS: Apps/FipleMac/Fiple.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FipleiOS:
    type: application
    platform: iOS
    sources:
      - Apps/FipleiOS
    dependencies:
      - package: FipleKit
      - package: SwiftTerm
      - package: RevenueCat
      # Share-sheet extension: "Share → Fiple" beams files/text to the Mac
      # without opening the app.
      - target: FipleShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maksatov.fipleapp
        PRODUCT_NAME: Fiple
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/FipleiOS/Info.plist
        # iPhone-only for 1.0 — the UI is designed for iPhone; on iPad the app
        # runs in iPhone compatibility mode instead of promising a native layout.
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_ENTITLEMENTS: Apps/FipleiOS/Fiple.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # "Share → Fiple" from any app: beams the shared file into the Mac's
  # Downloads (or text/URL onto its clipboard) using the pairing token shared
  # with the main app via the keychain access group.
  FipleShare:
    type: app-extension
    platform: iOS
    sources:
      - Apps/FipleShare
    dependencies:
      - package: FipleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maksatov.fipleapp.Share
        PRODUCT_NAME: FipleShare
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/FipleShare/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_ENTITLEMENTS: Apps/FipleShare/FipleShare.entitlements
