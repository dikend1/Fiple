name: Fiple
options:
  bundleIdPrefix: com.maksatov
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  FipleKit:
    path: FipleKit
  # SwiftTerm (MIT) — xterm-compatible terminal renderer for the iOS remote
  # terminal. First third-party dependency; recorded per the stack-selection
  # policy. iOS client only; the Mac host has no SwiftTerm dependency.
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Automatic signing with the developer's personal team, so the apps install
    # on real devices and the setting survives `xcodegen generate`.
    # BRANCH-ONLY (feat/remote-terminal): pinned to this machine's active team
    # (Bizhan Ashykhatov) so signing survives regeneration during local terminal
    # testing. The project's original team is VXJ8BY6538 — restore it before merge.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: M3UQXL2W5B
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "4"

targets:
  FipleMac:
    type: application
    platform: macOS
    sources:
      - Apps/FipleMac
    dependencies:
      - package: FipleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maksatov.fipleapp
        PRODUCT_NAME: Fiple
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/FipleMac/Info.plist
        # BRANCH-ONLY (feat/remote-terminal): sandbox off so the terminal can
        # spawn a real login shell. 1.0 ships sandboxed (Fiple.entitlements);
        # revert both lines before merging anywhere near main.
        ENABLE_HARDENED_RUNTIME: "NO"
        ENABLE_APP_SANDBOX: "NO"
        CODE_SIGN_ENTITLEMENTS: Apps/FipleMac/FipleTerminalDev.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FipleiOS:
    type: application
    platform: iOS
    sources:
      - Apps/FipleiOS
    dependencies:
      - package: FipleKit
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maksatov.fipleapp
        PRODUCT_NAME: Fiple
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/FipleiOS/Info.plist
        # iPhone-only for 1.0 — the UI is designed for iPhone; on iPad the app
        # runs in iPhone compatibility mode instead of promising a native layout.
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_ENTITLEMENTS: Apps/FipleiOS/Fiple.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
