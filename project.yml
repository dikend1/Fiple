name: Fiple
options:
  bundleIdPrefix: com.maksatov
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  # Bare `xcodebuild` without a scheme lands on the SAFE (sandboxed) config.
  defaultConfig: Release-MAS

# Three postures, encoded once — no more hand-flipping before an archive:
#   Debug         — day-to-day dev; sandbox OFF so the local terminal works.
#   Release-MAS   — Mac App Store archive; sandbox ON, store entitlements.
#   Release-DevID — notarized site download; sandbox OFF, hardened runtime.
configs:
  Debug: debug
  Release-MAS: release
  Release-DevID: release

packages:
  FipleKit:
    path: FipleKit
  # SwiftTerm (MIT) — xterm-compatible terminal renderer for the iOS remote
  # terminal. First third-party dependency; recorded per the stack-selection
  # policy. iOS client only; the Mac host has no SwiftTerm dependency.
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  # RevenueCat (StoreKit 2 receipt backend) — powers the Fiple Pro paywall.
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "6"
    CODE_SIGN_STYLE: Automatic
  configs:
    # One team everywhere: M3UQXL2W5B ("Bizhan Ashykhatov", the paid Individual
    # membership; Dias is Admin). It signs device runs AND distribution — the
    # app record + 1.0 live in the App Store under this team. VXJ8BY6538 is
    # Dias's FREE Personal Team (7-day profiles, cannot distribute) — do not
    # use it for archives; earlier comments had the two roles swapped.
    Debug:
      DEVELOPMENT_TEAM: M3UQXL2W5B
    Release-MAS:
      DEVELOPMENT_TEAM: M3UQXL2W5B
    Release-DevID:
      DEVELOPMENT_TEAM: M3UQXL2W5B

targets:
  FipleMac:
    type: application
    platform: macOS
    sources:
      - Apps/FipleMac
    dependencies:
      - package: FipleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maksatov.fipleapp
        PRODUCT_NAME: Fiple
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/FipleMac/Info.plist
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Terminal needs a real login shell, which the App Sandbox forbids —
        # so dev and the site (Developer ID) build run unsandboxed and the
        # MAS build hides the feature (TerminalController.isFeatureAvailable).
        Debug:
          ENABLE_APP_SANDBOX: "NO"
          CODE_SIGN_ENTITLEMENTS: Apps/FipleMac/FipleTerminalDev.entitlements
        Release-MAS:
          ENABLE_APP_SANDBOX: "YES"
          CODE_SIGN_ENTITLEMENTS: Apps/FipleMac/Fiple.entitlements
        Release-DevID:
          ENABLE_APP_SANDBOX: "NO"
          ENABLE_HARDENED_RUNTIME: "YES"
          CODE_SIGN_ENTITLEMENTS: Apps/FipleMac/FipleTerminalDev.entitlements

  FipleiOS:
    type: application
    platform: iOS
    sources:
      - Apps/FipleiOS
    dependencies:
      - package: FipleKit
      - package: SwiftTerm
      - package: RevenueCat
      # Share-sheet extension: "Share → Fiple" beams files/text to the Mac
      # without opening the app.
      - target: FipleShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maksatov.fipleapp
        PRODUCT_NAME: Fiple
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/FipleiOS/Info.plist
        # iPhone-only for 1.x — the UI is designed for iPhone; on iPad the app
        # runs in iPhone compatibility mode instead of promising a native layout.
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_ENTITLEMENTS: Apps/FipleiOS/Fiple.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # "Share → Fiple" from any app: beams the shared file into the Mac's
  # Downloads (or text/URL onto its clipboard) using the pairing token shared
  # with the main app via the keychain access group.
  FipleShare:
    type: app-extension
    platform: iOS
    sources:
      - Apps/FipleShare
    dependencies:
      - package: FipleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maksatov.fipleapp.Share
        PRODUCT_NAME: FipleShare
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/FipleShare/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_ENTITLEMENTS: Apps/FipleShare/FipleShare.entitlements

schemes:
  # Day-to-day scheme: runs Debug; archiving it produces the SAFE sandboxed
  # MAS build — you cannot accidentally ship the dev posture anymore.
  FipleMac:
    build:
      targets:
        FipleMac: all
    run:
      config: Debug
    archive:
      config: Release-MAS
  # Site-download build: unsandboxed + hardened runtime, for notarization.
  FipleMac-DevID:
    build:
      targets:
        FipleMac: all
    run:
      config: Release-DevID
    archive:
      config: Release-DevID
  FipleiOS:
    build:
      targets:
        FipleiOS: all
    run:
      config: Debug
    archive:
      config: Release-MAS
